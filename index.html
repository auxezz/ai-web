<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Neuro Kåre — Local Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="chat-root">
    <header class="chat-header">
      <h1>Neuro</h1>
      <p class="subtitle">Local AI - Neuro Prosjekt</p>
    </header>

    <main id="chatBox" class="chat-box" aria-live="polite"></main>

    <form id="inputForm" class="input-area" autocomplete="off">
      <input id="userInput" type="text" placeholder="Type your message..." />
      <button id="sendButton" type="submit">Send</button>
    </form>


    <img id="neuro-corner" src="Neuro.png" alt="Neuro-sama">

    <footer class="chat-footer">Local server: <span id="serverStatus">unknown</span></footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
